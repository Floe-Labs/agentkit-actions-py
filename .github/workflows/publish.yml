name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip and install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Install project with dev extras
        if: hashFiles('tests/**') != ''
        run: pip install -e ".[dev]"

      - name: Run tests
        if: hashFiles('tests/**') != ''
        run: pytest

      - name: Read package metadata
        id: meta
        run: |
          PKG_NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version is already published
        id: check
        run: |
          PKG_NAME="${{ steps.meta.outputs.name }}"
          PKG_VERSION="${{ steps.meta.outputs.version }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/$PKG_NAME/$PKG_VERSION/json")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "$PKG_NAME==$PKG_VERSION already published on PyPI, skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$PKG_NAME==$PKG_VERSION not found on PyPI (HTTP $HTTP_CODE), will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build distribution
        if: steps.check.outputs.should_publish == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
