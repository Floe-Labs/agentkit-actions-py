name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "coinbase-agentkit>=0.7.0" "web3>=7.0.0" "pydantic>=2.0.0" "eth-utils>=5.0.0"
          pip install -e ".[dev]"
          python -c "import coinbase_agentkit, pydantic, eth_utils; print('deps ok')"
      - run: ruff check src/
      - run: pytest tests/ -q
